<!DOCTYPE html>
<html>
<head>
<title>ARM Simulator</title>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'SF Mono','Menlo','Consolas',monospace; font-size:12px;
       background:#0d1117; color:#c9d1d9; display:flex; flex-direction:column; height:100vh; }
.panel { border:1px solid #30363d; margin:4px; border-radius:6px; overflow:hidden; display:flex; flex-direction:column; }
.panel h2 { background:#161b22; padding:6px 10px; font-size:11px; color:#58a6ff; border-bottom:1px solid #30363d; flex-shrink:0; }
.panel-body { flex:1; overflow-y:auto; padding:8px; }
#uart { white-space:pre-wrap; word-break:break-all; color:#7ee787; font-size:11px; }
.header-bar { background:#161b22; padding:4px 10px; border-bottom:1px solid #30363d;
              display:flex; align-items:center; gap:15px; font-size:11px; flex-shrink:0; }
.gbtn { width:32px; height:32px; border:1px solid #30363d; background:#21262d; color:#c9d1d9; border-radius:4px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.gbtn:active, .gbtn.pressed { background:#1f6feb; border-color:#1f6feb; }
.gbtn-ab { width:36px; height:36px; border-radius:50%; font-weight:bold; }
.resize-v { height:4px; cursor:row-resize; background:transparent; flex-shrink:0; }
.resize-v:hover, .resize-v.active { background:#30363d; }
</style>
</head>
<body>
<div class="header-bar">
  <span style="color:#58a6ff;font-weight:bold;">ARM Simulator</span>
  <span id="hdr-fps" style="color:#484f58;">0 fps</span>
</div>
<div style="display:flex;flex:1;overflow:hidden;flex-direction:column;">
  <!-- Display + Controls -->
  <div class="panel" id="display-panel" style="flex:2;min-height:200px;">
    <h2>Display</h2>
    <div class="panel-body" style="display:flex;align-items:center;justify-content:center;padding:8px;gap:12px;">
      <div style="display:grid;grid-template-columns:28px 28px 28px;grid-template-rows:28px 28px 28px;gap:2px;flex-shrink:0;">
        <div></div>
        <button class="gbtn" data-pin="4">▲</button>
        <div></div>
        <button class="gbtn" data-pin="2">◀</button>
        <div></div>
        <button class="gbtn" data-pin="3">▶</button>
        <div></div>
        <button class="gbtn" data-pin="1">▼</button>
        <div></div>
      </div>
      <canvas id="lcd" width="320" height="240" style="image-rendering:pixelated;border:1px solid #30363d;width:320px;height:240px;"></canvas>
      <div style="display:flex;gap:8px;flex-shrink:0;align-items:end;">
        <button class="gbtn gbtn-ab" data-pin="1" style="margin-bottom:0">B</button>
        <button class="gbtn gbtn-ab" data-pin="0" style="margin-bottom:20px">A</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:flex-end;padding:0 8px 4px;gap:6px;">
      <label style="font-size:9px;color:#484f58;">VOL</label>
      <input type="range" id="vol-slider" min="0" max="4095" value="2048"
             style="width:100px;accent-color:#58a6ff;">
    </div>
  </div>
  <div class="resize-v" data-above="display-panel" data-below="uart-panel"></div>
  <!-- UART Console -->
  <div class="panel" id="uart-panel" style="flex:1;min-height:100px;">
    <h2>UART Console</h2>
    <div class="panel-body" id="uart" style="overflow-y:auto"></div>
  </div>
</div>

<script>
/* ── Display via WebSocket ── */
const _lcdCanvas = document.getElementById('lcd');
const _lcdCtx = _lcdCanvas.getContext('2d');
let _lcdImg = null, _lcdW = 0, _lcdH = 0, _lcdRaw = null;
let _fpsCount = 0, _fpsLast = performance.now();

function _updateFps() {
  _fpsCount++;
  const now = performance.now();
  if (now - _fpsLast >= 1000) {
    document.getElementById('hdr-fps').textContent = `${_fpsCount} fps`;
    _fpsCount = 0; _fpsLast = now;
  }
}

function _applyFrame(data, isDelta) {
  if (!_lcdRaw) return;
  if (isDelta && data.byteLength === 0) return;  /* empty delta = no changes */
  if (isDelta) {
    const dv = new DataView(data.buffer, data.byteOffset, data.byteLength);
    let off = 0;
    while (off + 6 <= data.byteLength) {
      const start = dv.getUint32(off, true);
      const len = dv.getUint16(off + 4, true);
      off += 6;
      _lcdRaw.set(data.subarray(off, off + len), start);
      off += len;
    }
  } else {
    _lcdRaw.set(data);
  }
  const d = _lcdImg.data;
  for (let i = 0, n = _lcdW * _lcdH; i < n; i++) {
    const rgb565 = _lcdRaw[i*2] | (_lcdRaw[i*2+1] << 8);
    const j = i * 4;
    d[j]   = (rgb565 << 3) & 0xF8;  /* B (BGR) */
    d[j+1] = (rgb565 >> 3) & 0xFC;
    d[j+2] = (rgb565 >> 8) & 0xF8;  /* R (BGR) */
    d[j+3] = 255;
  }
  _lcdCtx.putImageData(_lcdImg, 0, 0);
  _updateFps();
}

function connectDisplayWS() {
  const ws = new WebSocket('ws://' + location.host + '/ws-display');
  ws.binaryType = 'arraybuffer';
  ws.onmessage = (e) => {
    const data = new Uint8Array(e.data);
    const type = data[0];
    const payload = data.subarray(1);
    if (type === 2) {
      const dv = new DataView(payload.buffer, payload.byteOffset, payload.byteLength);
      const w = dv.getUint16(0, true), h = dv.getUint16(2, true);
      if (w !== _lcdW || h !== _lcdH) {
        _lcdCanvas.width = w; _lcdCanvas.height = h;
        _lcdW = w; _lcdH = h;
        _lcdImg = _lcdCtx.createImageData(w, h);
        _lcdRaw = new Uint8Array(w * h * 2);
      }
      return;
    }
    _applyFrame(payload, type === 1);
    /* Detect stalls: log if gap between renders exceeds 50ms */
    const _now = performance.now();
    if (window._lastRender && _now - window._lastRender > 20) {
      console.log('DISPLAY STALL: ' + (_now - window._lastRender).toFixed(0) + 'ms gap, delta=' + (type===1) + ' size=' + payload.byteLength);
    }
    window._lastRender = _now;
  };
  ws.onclose = () => setTimeout(connectDisplayWS, 2000);
}
connectDisplayWS();

/* ── UART via WebSocket ── */
(function() {
  const uartEl = document.getElementById('uart');
  function connect() {
    const ws = new WebSocket('ws://' + location.host + '/ws-uart');
    ws.binaryType = 'arraybuffer';
    ws.onmessage = (e) => {
      uartEl.textContent += new TextDecoder().decode(e.data);
      uartEl.scrollTop = uartEl.scrollHeight;
    };
    ws.onclose = () => setTimeout(connect, 1000);
  }
  connect();
})();

/* ── Audio via WebSocket ── */
let _audioCtx = null, _audioStarted = false, _audioNextTime = 0;
const AUDIO_SAMPLE_RATE = 22050;

function initAudio() {
  if (_audioStarted) return;
  _audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: AUDIO_SAMPLE_RATE});
  _audioStarted = true;
  const ws = new WebSocket('ws://' + location.host + '/ws-audio');
  ws.binaryType = 'arraybuffer';
  ws.onmessage = (evt) => {
    const samples = new Int16Array(evt.data);
    const nFrames = samples.length / 2;
    if (nFrames < 1) return;
    const ab = _audioCtx.createBuffer(1, nFrames, AUDIO_SAMPLE_RATE);
    const ch = ab.getChannelData(0);
    for (let i = 0; i < nFrames; i++) {
      ch[i] = samples[i * 2] / 32768;  /* just left channel (mono) */
    }
    const src = _audioCtx.createBufferSource();
    src.buffer = ab;
    src.connect(_audioCtx.destination);
    const now = _audioCtx.currentTime;
    if (_audioNextTime < now - 0.1) _audioNextTime = now;
    if (_audioNextTime > now + 0.3) _audioNextTime = now;
    src.start(_audioNextTime);
    _audioNextTime += ab.duration;
  };
}
document.addEventListener('click',   initAudio, {once: true});
document.addEventListener('keydown', initAudio, {once: true});

/* ── Button controls ── */
document.querySelectorAll('.gbtn').forEach(btn => {
  const pin = parseInt(btn.dataset.pin);
  const press = () => { btn.classList.add('pressed'); fetch('/gpio', {method:'POST', body:JSON.stringify({cmd:'gpio',pin,port:2,val:1})}); };
  const release = () => { btn.classList.remove('pressed'); fetch('/gpio', {method:'POST', body:JSON.stringify({cmd:'gpio',pin,port:2,val:0})}); };
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); press(); });
  btn.addEventListener('touchend', (e) => { e.preventDefault(); release(); });
});

document.addEventListener('keydown', (e) => {
  const keyMap = {'z':0, 'x':1, 'ArrowLeft':2, 'ArrowRight':3, 'ArrowUp':4, 'ArrowDown':1, ' ':0};
  const pin = keyMap[e.key];
  if (pin !== undefined) {
    e.preventDefault();
    fetch('/gpio', {method:'POST', body:JSON.stringify({cmd:'gpio',pin,port:2,val:1})});
  }
});
document.addEventListener('keyup', (e) => {
  const keyMap = {'z':0, 'x':1, 'ArrowLeft':2, 'ArrowRight':3, 'ArrowUp':4, 'ArrowDown':1, ' ':0};
  const pin = keyMap[e.key];
  if (pin !== undefined)
    fetch('/gpio', {method:'POST', body:JSON.stringify({cmd:'gpio',pin,port:2,val:0})});
});

/* ── Volume slider ── */
document.getElementById('vol-slider').addEventListener('input', function() {
  fetch('/io', {method:'POST', body:'dial:0:' + this.value});
});

/* ── Panel resize ── */
document.querySelectorAll('.resize-v').forEach(handle => {
  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const above = document.getElementById(handle.dataset.above);
    const below = document.getElementById(handle.dataset.below);
    if (!above || !below) return;
    handle.classList.add('active');
    const startY = e.clientY;
    const aboveH = above.offsetHeight;
    const belowH = below.offsetHeight;
    const onMove = (e) => {
      const dy = e.clientY - startY;
      above.style.flex = 'none'; above.style.height = Math.max(60, aboveH + dy) + 'px';
      below.style.flex = 'none'; below.style.height = Math.max(60, belowH - dy) + 'px';
    };
    const onUp = () => {
      handle.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
});
</script>
</body>
</html>
