<!DOCTYPE html>
<html>
<head>
<title>ARM Debugger</title>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'SF Mono','Menlo','Consolas',monospace; font-size:12px;
       background:#0d1117; color:#c9d1d9; display:flex; flex-direction:column; height:100vh; }
.top { display:flex; flex:1; overflow:hidden; }
.panel { border:1px solid #30363d; margin:4px; border-radius:6px; overflow:hidden; display:flex; flex-direction:column; }
.panel h2 { background:#161b22; padding:6px 10px; font-size:11px; color:#58a6ff; border-bottom:1px solid #30363d; flex-shrink:0; }
.panel-body { flex:1; overflow-y:auto; padding:8px; }
#source-panel { flex:3; }
#mem-panel { flex:2; min-width:220px; }
#bottom { display:flex; height:200px; min-height:100px; }
#uart-panel { flex:1; }
#cmd-panel { flex:1; }
.src-line { white-space:pre; padding:1px 4px; }
.src-line.current { background:#1f3a1f; color:#7ee787; font-weight:bold; }
.src-line .num { color:#484f58; display:inline-block; width:40px; text-align:right; margin-right:8px; }
.src-line.current .num { color:#7ee787; }
.mode { padding:1px 6px; border-radius:3px; font-size:10px; }
.mode.thread { background:#1f3a1f; color:#7ee787; }
.mode.handler { background:#3d1f1f; color:#f85149; }
#uart { white-space:pre-wrap; word-break:break-all; color:#7ee787; font-size:11px; }
#cmd-input { width:100%; background:#0d1117; border:1px solid #30363d; color:#c9d1d9;
             font-family:inherit; font-size:12px; padding:6px 8px; border-radius:4px; flex-shrink:0; }
#cmd-input:focus { outline:none; border-color:#58a6ff; }
#cmd-log { flex:1; overflow-y:auto; font-size:11px; color:#484f58; }
.fn { color:#d2a8ff; }
.addr { color:#58a6ff; }
.file { color:#484f58; font-size:10px; }
.header-bar { background:#161b22; padding:4px 10px; border-bottom:1px solid #30363d;
              display:flex; align-items:center; gap:15px; font-size:11px; flex-shrink:0; }
.cyc { color:#484f58; }
</style>
</head>
<body>
<div class="header-bar">
  <span class="fn" id="hdr-func">—</span>
  <span class="cyc" id="hdr-cycles">cy 0</span>
  <span id="hdr-mode"></span>
  <span>PC <span class="addr" id="hdr-pc">—</span></span>
  <span>PSP <span class="addr" id="hdr-psp">—</span></span>
  <span>MSP <span class="addr" id="hdr-msp">—</span></span>
</div>
<div class="top">
  <div class="panel" id="source-panel">
    <h2>Source <span id="run-indicator" style="display:none;float:right;color:#7ee787;font-weight:normal">⟳ Running...</span></h2>
    <div class="panel-body" id="source"></div>
  </div>
  <div class="panel" id="mem-panel">
    <h2>Memory Map — STM32F411RE</h2>
    <div class="panel-body" id="memmap" style="padding:4px 8px;"></div>
  </div>
</div>
<div class="panel" id="timeline-panel" style="margin:0 4px;height:80px;min-height:60px;">
  <h2>Timeline</h2>
  <div class="panel-body" id="timeline" style="padding:2px 4px;overflow-x:auto;overflow-y:hidden;white-space:nowrap;"></div>
</div>
<div id="bottom">
  <div class="panel" id="cmd-panel">
    <h2>Debugger</h2>
    <div class="panel-body" style="display:flex;flex-direction:column;padding:4px 8px;">
      <div id="cmd-log"></div>
      <input id="cmd-input" placeholder="(dbg) type command..." autofocus>
    </div>
  </div>
  <div class="panel" id="uart-panel">
    <h2>UART Console</h2>
    <div class="panel-body" id="uart" style="overflow-y:auto"></div>
  </div>
</div>

<script>
const log = (msg) => {
  const el = document.getElementById('cmd-log');
  el.innerHTML += `<div style="color:#888">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
  fetch('/log', {method:'POST', body:msg}).catch(()=>{});
};

async function simCmd(cmdObj) {
  const r = await fetch('/cmd', {method:'POST', body: JSON.stringify(cmdObj)});
  if (!r.ok) throw new Error('sim-core error');
  return await r.json();
}

async function refreshUI(stopInfo) {
  const regs = await simCmd({cmd:'regs'});
  let source = null;
  if (stopInfo.file) {
    source = await simCmd({cmd:'source', file: stopInfo.file});
  }
  render(stopInfo, regs, source, null);
}

// Poll UART independently
async function pollUart() {
  try {
    const r = await fetch('/uart');
    if (r.ok) {
      const u = await r.json();
      if (u.uart) document.getElementById('uart').textContent = u.uart;
    }
  } catch(e) {}
  setTimeout(pollUart, 300);
}
pollUart();

async function sendCmd(cmd) {
  log(`<span style="color:#c9d1d9">(dbg) ${esc(cmd)}</span>`);
  try {
    let cmdObj;
    if (cmd === 'c' || cmd === 'continue') cmdObj = {cmd:'continue'};
    else if (cmd === 'r' || cmd === 'run') cmdObj = {cmd:'run'};
    else if (cmd === 's' || cmd === 'step') cmdObj = {cmd:'step'};
    else if (cmd === 'n' || cmd === 'next') cmdObj = {cmd:'next'};
    else if (cmd.startsWith('b ') || cmd.startsWith('break ')) {
      const spec = cmd.replace(/^(b|break)\s+/, '');
      cmdObj = {cmd:'break', spec};
    } else if (cmd.startsWith('d ') || cmd.startsWith('delete ')) {
      const n = parseInt(cmd.replace(/^(d|delete)\s+/, ''));
      cmdObj = {cmd:'delete', n};
    } else {
      log(`Unknown command: ${cmd}`);
      return;
    }
    const resp = await simCmd(cmdObj);
    // Commands that return stop info: step, next, continue, run
    if (resp.pc !== undefined) {
      await refreshUI(resp);
    }
  } catch(e) { log(`Error: ${e.message}`); }
}

// Initial load — get stop info from connection handshake
(async () => {
  log('Connected');
  try {
    const r = await fetch('/init');
    if (r.ok) {
      const stopInfo = await r.json();
      await refreshUI(stopInfo);
    }
  } catch(e) { log(`Init error: ${e.message}`); }
})();

const cmdLog = document.getElementById('cmd-log');
const cmdInput = document.getElementById('cmd-input');

function hex(n) { return '0x' + (n >>> 0).toString(16).padStart(8,'0'); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

let lastState = null;
function render(stop, regs, source, uart) {
  lastState = stop;

  // Header
  document.getElementById('hdr-func').textContent = stop.func || '???';
  document.getElementById('hdr-cycles').textContent = `cy ${(stop.cycles||0).toLocaleString()}`;
  document.getElementById('hdr-pc').textContent = hex(stop.pc || 0);
  if (regs) {
    document.getElementById('hdr-psp').textContent = hex(regs.psp || 0);
    document.getElementById('hdr-msp').textContent = hex(regs.msp || 0);
  }

  // Source
  const src = document.getElementById('source');
  if (source && source.lines && source.lines.length) {
    const curLine = stop.line || -1;
    src.innerHTML = `<div class="file">${esc(source.file)}</div>` +
      source.lines.map((text, i) => {
        const num = i + 1;
        return `<div class="src-line ${num===curLine?'current':''}" ${num===curLine?'id="cur-line"':''}>` +
          `<span class="num">${num===curLine?'→':' '}${num}</span>${esc(text)}</div>`;
      }).join('');
    const cur = document.getElementById('cur-line');
    if (cur) cur.scrollIntoView({block:'center', behavior:'smooth'});
  } else {
    src.innerHTML = '<div style="color:#484f58;padding:20px">No source</div>';
  }

  // UART
  if (uart && uart.uart) document.getElementById('uart').textContent = uart.uart;
}

// STM32F411RE address map — regions shown in the vertical bar
const regions = [
  { name:'Flash',        base:0x08000000, size:512*1024,  color:'#8b949e' },
  { name:'System ROM',   base:0x1FFF0000, size:0x7A10,    color:'#8b949e' },
  { name:'SRAM',         base:0x20000000, size:128*1024,  color:'#8b949e' },
  { name:'APB1',         base:0x40000000, size:0x6800,    color:'#8b949e' },
  { name:'APB2',         base:0x40010000, size:0x6C00,    color:'#8b949e' },
  { name:'AHB1',         base:0x40020000, size:0x3C00,    color:'#8b949e' },
  { name:'AHB2 (USB)',   base:0x50000000, size:0x60C00,   color:'#8b949e' },
  { name:'ITM/DWT/TPIU', base:0xE0000000, size:0x42000,   color:'#8b949e' },
  { name:'SysTick+NVIC', base:0xE000E000, size:0x1000,    color:'#8b949e' },
  { name:'SCB/MPU/FPU',  base:0xE000ED00, size:0x300,     color:'#8b949e' },
];

const ctxColors = {
  'SysTick':'#f0883e', 'PendSV':'#f0883e', 'SVC':'#f0883e', 'IRQ':'#f0883e',
  'idle_task':'#21262d',
};
function ctxColor(name) {
  if (ctxColors[name]) return ctxColors[name];
  // Tasks get distinct muted colors
  const taskCols = ['#1f6feb','#238636','#8957e5','#bf4b8a','#58a6ff','#7ee787'];
  let h = 0; for (let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) & 0xFFFF;
  return taskCols[h % taskCols.length];
}

function renderTimeline(s) {
  const el = document.getElementById('timeline');
  const tl = s.timeline || [];
  if (tl.length < 2) { el.innerHTML = '<span style="color:#484f58;padding:8px">No context switches yet</span>'; return; }

  const W = el.clientWidth - 8;
  const H = el.clientHeight - 4;
  if (W < 50 || H < 20) return;

  const minCy = tl[0].cy;
  const maxCy = Math.max(tl[tl.length-1].cy, s.cycles);
  const span = maxCy - minCy || 1;

  let svg = `<svg width="${W}" height="${H}" style="font-family:inherit">`;

  for (let i = 0; i < tl.length; i++) {
    const t = tl[i];
    const nextCy = (i+1 < tl.length) ? tl[i+1].cy : maxCy;
    const x = Math.floor((t.cy - minCy) / span * W);
    const w = Math.max(1, Math.floor((nextCy - t.cy) / span * W));
    const col = ctxColor(t.ctx);
    const isHandler = ['SysTick','PendSV','SVC','IRQ'].includes(t.ctx);
    const y = isHandler ? 0 : 14;
    const h = isHandler ? 12 : H - 16;

    svg += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${col}" opacity="0.7" rx="1"/>`;
    // Label if wide enough
    if (w > 30) {
      const label = t.ctx.length > w/6 ? t.ctx.substring(0,Math.floor(w/6)) : t.ctx;
      svg += `<text x="${x+w/2}" y="${y+h/2+4}" fill="#fff" text-anchor="middle" font-size="9" opacity="0.9">${label}</text>`;
    }
  }

  // Axis labels
  svg += `<text x="0" y="${H}" fill="#484f58" font-size="8">cy ${minCy.toLocaleString()}</text>`;
  svg += `<text x="${W}" y="${H}" fill="#484f58" font-size="8" text-anchor="end">cy ${maxCy.toLocaleString()}</text>`;
  svg += '</svg>';

  // Legend — unique contexts
  const seen = new Set();
  let legend = '<div style="display:flex;gap:10px;padding:2px 4px;flex-wrap:wrap;font-size:9px">';
  for (const t of tl) {
    if (seen.has(t.ctx)) continue;
    seen.add(t.ctx);
    const col = ctxColor(t.ctx);
    legend += `<span><span style="display:inline-block;width:8px;height:8px;background:${col};border-radius:1px;margin-right:3px;vertical-align:middle"></span>${t.ctx}</span>`;
  }
  legend += '</div>';
  el.innerHTML = svg + legend;
}

function renderMemMap(s) {
  const el = document.getElementById('memmap');
  const zoom = memZoom;
  const W = el.clientWidth - 8;
  if (W < 100) return;

  const addrW = 78;  // space for address labels on left
  const barX = addrW + 4;
  const labelW = 110; // space for labels on right
  const barW = Math.max(40, W - barX - labelW);
  const labelX = barX + barW + 6;

  // Build segments: regions + gaps between them
  const segs = [];
  let prev = 0;
  for (const r of regions) {
    if (r.base > prev) segs.push({type:'gap', base:prev, size:r.base-prev});
    segs.push({type:'region', ...r});
    prev = r.base + r.size;
  }
  if (prev < 0xFFFFFFFF) segs.push({type:'gap', base:prev, size:0xFFFFFFFF-prev});

  // Assign pixel heights: gaps get 6px, regions get proportional height
  // Total region bytes for proportional sizing
  const totalRegionBytes = regions.reduce((a,r) => a + r.size, 0);
  const baseH = Math.max(300, el.clientHeight - 20);
  const gapPx = 6;
  const totalGapPx = segs.filter(s=>s.type==='gap').length * gapPx;
  const regionPx = (baseH * zoom) - totalGapPx;

  // Reverse so highest addresses at top, lowest at bottom
  segs.reverse();

  // Compute y positions
  let y = 10;
  for (const seg of segs) {
    seg.y = y;
    if (seg.type === 'gap') {
      seg.h = gapPx;
    } else {
      seg.h = Math.max(8, Math.round(seg.size / totalRegionBytes * regionPx));
    }
    y += seg.h;
  }
  const totalH = y + 10;

  let svg = `<svg width="${W}" height="${totalH}" style="font-family:inherit;font-size:9px;">`;

  for (const seg of segs) {
    if (seg.type === 'gap') {
      // Dotted gap indicator
      svg += `<line x1="${barX+barW/2-5}" y1="${seg.y+3}" x2="${barX+barW/2+5}" y2="${seg.y+3}" stroke="#21262d" stroke-dasharray="2,2"/>`;
    } else {
      // Region bar
      svg += `<rect x="${barX}" y="${seg.y}" width="${barW}" height="${seg.h}" fill="${seg.color}" opacity="0.2" stroke="${seg.color}" stroke-opacity="0.5" rx="2" onclick="zoomToRegion(${seg.base},${seg.size})"/>`;
      // Top address
      // Top address (high end)
      svg += `<text x="${barX-4}" y="${seg.y+8}" fill="#484f58" text-anchor="end" font-size="8">${hex(seg.base+seg.size)}</text>`;
      // Bottom address (low end)
      if (seg.h > 14) {
        svg += `<text x="${barX-4}" y="${seg.y+seg.h-2}" fill="#484f58" text-anchor="end" font-size="8">${hex(seg.base)}</text>`;
      }
      // Region label on right
      const ly = seg.y + seg.h/2 + 3;
      svg += `<text x="${labelX}" y="${ly}" fill="${seg.color}" font-size="10">${seg.name}</text>`;
      const sizeStr = seg.size >= 1024*1024 ? `${(seg.size/1024/1024).toFixed(0)}MB` : seg.size >= 1024 ? `${(seg.size/1024).toFixed(0)}KB` : `${seg.size}B`;
      svg += `<text x="${labelX}" y="${ly+11}" fill="#484f58" font-size="8">${sizeStr}</text>`;

      // Draw ELF sections that fall within this region
      const secColor = '#8b949e';
      for (const sec of (s.sections || [])) {
        if (sec.addr < seg.base || sec.addr >= seg.base + seg.size) continue;
        const sy = seg.y + seg.h - (sec.addr + sec.size - seg.base) / seg.size * seg.h;
        const sh = Math.max(1, sec.size / seg.size * seg.h);
        svg += `<rect x="${barX+1}" y="${sy}" width="${barW-2}" height="${sh}" fill="${secColor}" opacity="0.35" rx="1" onclick="zoomToRegion(${sec.addr},${sec.size})"/>`;
        if (sh > 8) {
          const secSize = sec.size >= 1024 ? `${(sec.size/1024).toFixed(1)}KB` : `${sec.size}B`;
          svg += `<text x="${labelX+2}" y="${sy+sh/2+3}" fill="${secColor}" font-size="7">${sec.name} ${secSize}</text>`;
        }
        svg += `<text x="${barX-4}" y="${sy+sh/2+3}" fill="${secColor}" text-anchor="end" font-size="7">${hex(sec.addr)}</text>`;
      }

      // Draw task stacks inside SRAM
      if (seg.name === 'SRAM') {
        const tasks = s.tasks || [];
        const RAM_BASE = seg.base, RAM_SIZE = seg.size;

        // Collect addresses already labeled (from ELF sections) to avoid duplicates
        const labeledAddrs = new Set();
        for (const sec of (s.sections || [])) {
          if (sec.addr >= seg.base && sec.addr < seg.base + seg.size)
            labeledAddrs.add(sec.addr);
        }

        for (let i = 0; i < tasks.length; i++) {
          const t = tasks[i];
          if (!t.stack_bot || !t.stack_top) continue;
          if (t.stack_bot < RAM_BASE || t.stack_top > RAM_BASE + RAM_SIZE) continue;
          const col = t.active ? '#c9d1d9' : '#484f58';
          const spCol = '#7ee787';
          const addrToY = (a) => seg.y + seg.h - (a - RAM_BASE) / RAM_SIZE * seg.h;

          const sy0 = addrToY(t.stack_top);
          const sy1 = addrToY(t.stack_bot);
          const sh = Math.max(1, sy1 - sy0);

          // Full allocation fill
          svg += `<rect x="${barX+1}" y="${sy0}" width="${barW-2}" height="${sh}" fill="${col}" opacity="0.15" onclick="zoomToRegion(${t.stack_bot},${t.stack_size})"/>`;

          // Top/bottom separator lines
          svg += `<line x1="${barX}" y1="${sy0}" x2="${barX+barW}" y2="${sy0}" stroke="${col}" stroke-width="1"/>`;
          svg += `<line x1="${barX}" y1="${sy1}" x2="${barX+barW}" y2="${sy1}" stroke="${col}" stroke-width="1"/>`;

          // Used portion
          if (t.stack_used > 0 && t.stack_size > 0) {
            const uh = Math.max(1, t.stack_used / t.stack_size * sh);
            svg += `<rect x="${barX+1}" y="${sy0}" width="${barW-2}" height="${uh}" fill="${col}" opacity="0.4"/>`;
          }

          const data = t.stack_data || [];
          const frames = t.frames || [];
          const pxPer4 = (sh / t.stack_size) * 4;  // pixels per 4-byte word

          // Build frame boundaries for lookup
          const frameBounds = frames.map((fr, fi) => ({
            sp: fr.sp, func: fr.func,
            end: (fi+1 < frames.length) ? frames[fi+1].sp : t.stack_top
          }));

          if (pxPer4 > 14) {
            // ZOOMED IN: show each word as a row with address, value, symbol
            let lastFrameIdx = -1;
            let di = 0;
            while (di < data.length) {
              const d = data[di];
              const dy = addrToY(d.addr + 4);  // bottom of this word cell
              const cellH = pxPer4;

              // Frame header when entering a new frame
              const fi = frameBounds.findIndex(f => d.addr >= f.sp && d.addr < f.end);
              if (fi >= 0 && fi !== lastFrameIdx) {
                lastFrameIdx = fi;
                const fy = addrToY(frameBounds[fi].sp);
                svg += `<line x1="${barX}" y1="${fy}" x2="${barX+barW}" y2="${fy}" stroke="#7ee787" stroke-width="0.5" opacity="0.6"/>`;
                svg += `<text x="${labelX}" y="${fy+11}" fill="#7ee787" font-size="10" font-weight="bold">${frameBounds[fi].func}</text>`;
                const fsize = frameBounds[fi].end - frameBounds[fi].sp;
                svg += `<text x="${labelX}" y="${fy+22}" fill="#484f58" font-size="9">${fsize} bytes</text>`;
              }

              // Collapse consecutive zeros
              let zeroRun = 0;
              if (d.val === 0 && !d.sym) {
                let j = di;
                while (j < data.length && data[j].val === 0 && !data[j].sym) { zeroRun++; j++; }
              }

              if (zeroRun > 2) {
                const startAddr = d.addr;
                const endAddr = data[di + zeroRun - 1].addr + 4;
                const zy0 = addrToY(endAddr);
                const zy1 = addrToY(startAddr);
                const zh = zy1 - zy0;
                svg += `<rect x="${barX+1}" y="${zy0}" width="${barW-2}" height="${zh}" fill="#21262d" opacity="0.5" rx="2"/>`;
                svg += `<text x="${barX+barW/2}" y="${zy0+zh/2+4}" fill="#6e7681" text-anchor="middle" font-size="10">${zeroRun*4} bytes = 0</text>`;
                // Address range on left
                svg += `<text x="${barX-4}" y="${zy0+zh/2+4}" fill="#484f58" text-anchor="end" font-size="9">${hex(startAddr)}</text>`;
                di += zeroRun;
              } else {
                // Single word row
                const isSP = d.addr === t.sp;
                if (isSP) svg += `<rect x="${barX+1}" y="${dy}" width="${barW-2}" height="${cellH}" fill="#1a2e1a" opacity="0.8"/>`;
                // Separator line
                svg += `<line x1="${barX+1}" y1="${dy}" x2="${barX+barW-1}" y2="${dy}" stroke="${col}" stroke-width="0.3" opacity="0.3"/>`;
                // Address on left
                svg += `<text x="${barX-4}" y="${dy+cellH/2+4}" fill="${isSP?'#7ee787':'#484f58'}" text-anchor="end" font-size="9">${hex(d.addr)}</text>`;
                // Value inside bar
                const valStr = '0x' + (d.val >>> 0).toString(16).padStart(8,'0');
                svg += `<text x="${barX+4}" y="${dy+cellH/2+4}" fill="#c9d1d9" font-size="10">${valStr}</text>`;
                // Symbol annotation
                if (d.sym) svg += `<text x="${barX+barW/2+10}" y="${dy+cellH/2+4}" fill="#d2a8ff" font-size="9">${d.sym}</text>`;
                di++;
              }
            }
          } else {
            // OVERVIEW: frame brackets on right with function names
            for (let fi = 0; fi < frames.length; fi++) {
              const fr = frames[fi];
              if (fr.sp < t.stack_bot || fr.sp > t.stack_top) continue;
              const fy = addrToY(fr.sp);
              const nextSp = (fi + 1 < frames.length && frames[fi+1].sp <= t.stack_top) ? frames[fi+1].sp : t.stack_top;
              const fh = addrToY(nextSp) - fy;
              svg += `<line x1="${barX}" y1="${fy}" x2="${barX+barW}" y2="${fy}" stroke="${col}" stroke-width="0.5" opacity="0.6"/>`;
              const bx = labelX - 2;
              svg += `<line x1="${bx}" y1="${fy+1}" x2="${bx}" y2="${fy+fh-1}" stroke="${col}" stroke-width="0.5" opacity="0.5"/>`;
              svg += `<line x1="${bx-3}" y1="${fy}" x2="${bx}" y2="${fy}" stroke="${col}" stroke-width="0.5" opacity="0.5"/>`;
              svg += `<line x1="${bx-3}" y1="${fy+fh}" x2="${bx}" y2="${fy+fh}" stroke="${col}" stroke-width="0.5" opacity="0.5"/>`;
              if (fh > 8) svg += `<text x="${bx+4}" y="${fy+fh/2+3}" fill="${col}" font-size="8">${fr.func}</text>`;
            }
          }

          // SP line
          const spAddr = t.sp;
          if (spAddr >= t.stack_bot && spAddr <= t.stack_top) {
            const spY = addrToY(spAddr);
            svg += `<line x1="${barX}" y1="${spY}" x2="${barX+barW}" y2="${spY}" stroke="${spCol}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
            svg += `<text x="${barX-4}" y="${spY+3}" fill="${spCol}" text-anchor="end" font-size="7">SP ${hex(spAddr)} →</text>`;
          }

          // Stack bounds labels — deduplicated
          if (!labeledAddrs.has(t.stack_top)) {
            svg += `<text x="${barX-4}" y="${sy0+4}" fill="#484f58" text-anchor="end" font-size="7">${hex(t.stack_top)}</text>`;
            labeledAddrs.add(t.stack_top);
          }
          if (!labeledAddrs.has(t.stack_bot)) {
            svg += `<text x="${barX-4}" y="${sy1+3}" fill="#484f58" text-anchor="end" font-size="7">${hex(t.stack_bot)}</text>`;
            labeledAddrs.add(t.stack_bot);
          }

          // Task name on right
          if (sh > 6) {
            const stkSize = t.stack_size >= 1024 ? `${(t.stack_size/1024).toFixed(1)}KB` : `${t.stack_size}B`;
            svg += `<text x="${labelX}" y="${sy0+sh/2+3}" fill="${col}" font-size="8">${t.name||'t'+i} stack ${stkSize}${t.active?' ◀':''}</text>`;
          }
        }

        // MSP marker
        if (s.msp >= RAM_BASE && s.msp <= RAM_BASE + RAM_SIZE) {
          const mspY = seg.y + seg.h - (s.msp - RAM_BASE) / RAM_SIZE * seg.h;
          svg += `<line x1="${barX}" y1="${mspY}" x2="${barX+barW}" y2="${mspY}" stroke="#ffa657" stroke-width="1" stroke-dasharray="3,2"/>`;
          svg += `<text x="${labelX}" y="${mspY+3}" fill="#ffa657" font-size="8">MSP</text>`;
          svg += `<text x="${barX-4}" y="${mspY+3}" fill="#ffa657" text-anchor="end" font-size="7">${hex(s.msp)}</text>`;
        }
      }
    }
  }

  svg += '</svg>';
  el.innerHTML = svg;
}

// Click a section/region to zoom to it
function zoomToRegion(addr, size) {
  // Find which region contains this address to calculate needed zoom
  const totalRegionBytes = regions.reduce((a,r) => a + r.size, 0);
  const panelH = memEl.clientHeight;
  // We want this section to fill ~80% of the visible panel
  const targetFraction = size / totalRegionBytes;
  const neededZoom = 0.8 / targetFraction;
  memZoom = Math.max(1, Math.min(5000, neededZoom));

  if (lastState) renderMemMap(lastState);

  // Now scroll to center the section
  // Find the y position of this address in the new SVG
  const svgH = memEl.scrollHeight;
  // Address fraction within all regions (approximate)
  let bytesBefore = 0;
  for (const r of regions) {
    if (addr >= r.base && addr < r.base + r.size) {
      bytesBefore += (addr + size/2) - r.base;
      break;
    } else if (r.base + r.size <= addr) {
      bytesBefore += r.size;
    }
  }
  const frac = bytesBefore / totalRegionBytes;
  // In reversed layout, low address = bottom, so scroll target is (1-frac)*svgH
  const targetY = (1 - frac) * svgH;
  memEl.scrollTop = targetY - panelH / 2;
}

// Pinch/scroll zoom on memory map, anchored at mouse position
let memZoom = 1;
const memEl = document.getElementById('memmap');
memEl.addEventListener('wheel', (e) => {
  // Pinch-to-zoom sends ctrlKey; regular scroll does not
  if (!e.ctrlKey) return; // let normal scroll work
  e.preventDefault();
  const rect = memEl.getBoundingClientRect();
  const mouseY = e.clientY - rect.top + memEl.scrollTop;
  const oldH = memEl.scrollHeight;
  const frac = oldH > 0 ? mouseY / oldH : 0;

  const delta = e.deltaY < 0 ? 1.05 : 1/1.05;
  memZoom = Math.max(1, Math.min(5000, memZoom * delta));

  if (lastState) renderMemMap(lastState);

  const newH = memEl.scrollHeight;
  const newMouseY = frac * newH;
  memEl.scrollTop = newMouseY - (e.clientY - rect.top);
}, {passive: false});

cmdInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const cmd = cmdInput.value.trim();
    if (!cmd) return;
    sendCmd(cmd);
    cmdInput.value = '';
  }
});

document.addEventListener('keydown', (e) => {
  if (document.activeElement === cmdInput) return;
  if (e.key === 'F5') { sendCmd('c'); e.preventDefault(); }
  if (e.key === 'F10') { sendCmd('n'); e.preventDefault(); }
  if (e.key === 'F11') { sendCmd('s'); e.preventDefault(); }
});
